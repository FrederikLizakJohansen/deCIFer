out_dir: 'minicif_ablation_small_conv_cross'
eval_interval: 500
eval_iters_train: 50
eval_iters_val: 50
log_interval: 20
metrics_log_interval: 20
init_from: 'scratch'
device: 'cuda'
dtype: 'bfloat16'
always_save_checkpoint: False
validate: True
dataset: 'data/noma'
tokenizer: 'minicif'
batch_size: 64
batch_token_budget: 12800
block_size: 640
num_workers_dataloader: 4
sampling_strategy: 'crystal_system_balanced'
n_layer: 4
n_head: 4
n_embd: 256
dropout: 0.1
learning_rate: 1e-3
gradient_accumulation_steps: 5
max_iters: 15_000
lr_decay_iters: 15_000
min_lr: 1e-6
weight_decay: 0.2
beta2: 0.99
warmup_iters: 100
early_stopping_patience: 12
condition: True
boundary_masking: True
minicif_constrained_decoding: True
condition_encoder: 'conv'
condition_n_tokens: 32
condition_cross_attention: True
condition_cross_attention_every_n_layers: 1
pxrd_encoder_channels: 64
pxrd_encoder_kernel_size: 7
qmin: 0.0
qmax: 10.0
nyquist_points_per_fwhm: 3
fwhm_range_min: 0.06
fwhm_range_max: 0.06
eta_range_min: 0.5
eta_range_max: 0.5
noise_range_min: 0.0
noise_range_max: 0.0
intensity_scale_range_min: 1.0
intensity_scale_range_max: 1.0
mask_prob: 0.0
q_shift_range_min: 0.0
q_shift_range_max: 0.0
q_scale_range_min: 1.0
q_scale_range_max: 1.0
peak_intensity_jitter_range_min: 1.0
peak_intensity_jitter_range_max: 1.0
peak_dropout_prob: 0.0
background_range_min: 0.0
background_range_max: 0.0
impurity_peak_count_min: 0
impurity_peak_count_max: 0
impurity_intensity_range_min: 0.01
impurity_intensity_range_max: 0.05
particle_size_range_min: 0.0
particle_size_range_max: 0.0
peak_asymmetry_range_min: 0.0
peak_asymmetry_range_max: 0.0
final_normalize_xrd: True
max_xrd_peaks: 1024
max_peak_list_peaks: 512
xrd_augmentation_on_device: True
