out_dir: 'minicif_pxrd_encoder_pretrain_synthetic_debug'
dataset: 'data/noma'
split: 'train'
device: 'cuda'
dtype: 'float32'
seed: 1337

batch_size: 32
num_workers_dataloader: 0
dataloader_multiprocessing_context: ''
dataloader_timeout_seconds: 0
pin_memory: False
preload_dataset_to_memory: False
synthetic_debug_data: True
synthetic_debug_size: 256
max_raw_peaks_per_sample: 2048
resume: False
resume_from: ''
save_on_interrupt: True
max_runtime_seconds: 0
max_iters: 50
eval_interval: 25
log_interval: 5
plot_interval: 25
plot_window: 100
live_plot: False
learning_rate: 1e-3
weight_decay: 0.1
beta2: 0.99
temperature: 0.1
projection_dim: 128

condition_encoder: 'hybrid'
condition_n_tokens: 32
dense_condition_n_tokens: 16
peak_condition_n_tokens: 16
peak_encoder_hidden_dim: 128
n_embd: 256
n_head: 4
dropout: 0.0
pxrd_encoder_channels: 64
pxrd_encoder_kernel_size: 7

qmin: 0.0
qmax: 10.0
nyquist_points_per_fwhm: 3
fwhm_range_min: 0.04
fwhm_range_max: 0.09
eta_range_min: 0.5
eta_range_max: 0.5
noise_range_min: 0.0
noise_range_max: 0.03
intensity_scale_range_min: 0.9
intensity_scale_range_max: 1.0
mask_prob: 0.0
q_shift_range_min: -0.02
q_shift_range_max: 0.02
q_scale_range_min: 0.998
q_scale_range_max: 1.002
peak_intensity_jitter_range_min: 0.9
peak_intensity_jitter_range_max: 1.1
peak_dropout_prob: 0.05
background_range_min: 0.0
background_range_max: 0.03
impurity_peak_count_min: 0
impurity_peak_count_max: 0
impurity_intensity_range_min: 0.01
impurity_intensity_range_max: 0.05
particle_size_range_min: 0.0
particle_size_range_max: 0.0
peak_asymmetry_range_min: 0.0
peak_asymmetry_range_max: 0.0
final_normalize_xrd: True
max_xrd_peaks: 1024
max_peak_list_peaks: 512
